name: Artículo diario (cola SEO)

on:
  schedule:
    # Cada día a las 07:00 UTC (09:00 España, 02:00 CDMX)
    - cron: '0 7 * * *'
  # Lanzar a mano desde Actions → Run workflow
  workflow_dispatch:
    inputs:
      force_slug:
        description: 'Forzar un slug concreto de la cola (opcional)'
        required: false
        default: ''

jobs:
  publish:
    name: Generar artículo desde cola SEO
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias del script
        run: npm install @anthropic-ai/sdk gray-matter

      - name: Generar artículo desde cola SEO
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE_SLUG: ${{ github.event.inputs.force_slug }}
        run: node scripts/generate-from-queue.mjs

      - name: Resumen de cola restante
        run: |
          PENDING=$(node -e "
            const q = JSON.parse(require('fs').readFileSync('content/queue.json','utf-8'));
            const p = q.queue.filter(i=>i.status==='pending');
            console.log(p.length + ' artículos pendientes en cola');
            if(p.length>0) console.log('Próximo: ' + p.sort((a,b)=>b.prioridad-a.prioridad)[0].keyword_principal);
          ")
          echo "$PENDING"
